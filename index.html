<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lionsign</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root {
  --black:#0b0b0b;
  --gray:#f5f5f5;
  --gold:#c6a46c;
  --red:#ff2a2a;
}

/* BODY */
body {
  margin:0;
  background:
    radial-gradient(circle at top, #151515, #0b0b0b 60%);
  color:white;
  font-family:'Oswald',sans-serif;
  cursor:none;
}

/* GRID BACKGROUND */
.grid-bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;

  background:
    linear-gradient(rgba(198,164,108,0.25) 1px, transparent 1px),
    linear-gradient(90deg, rgba(198,164,108,0.25) 1px, transparent 1px);

  background-size:60px 60px;
  opacity:0.45;
  animation:gridMove 25s linear infinite;
}

/* CURSOR */
.cursor {
  width:18px;
  height:18px;
  border:2px solid var(--red);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.15s ease;
  z-index:999;
}

.cursor.active {
  transform:translate(-50%,-50%) scale(1.8);
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo {
  font-family:'Bebas Neue';
  font-size:36px;
  color:white;
}

.contact a {
  color:var(--gold);
  font-size:22px;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:90px 20px 70px;
}

.hero h1 {
  font-family:'Bebas Neue';
  font-size:110px;
}

.hero p {
  margin:10px auto 30px;
  font-size:20px;
  max-width:650px;
}

/* CTA */
.cta {
  padding:18px 60px;
  background:linear-gradient(135deg, var(--gold), #e0c08a);
  color:black;
  border-radius:12px;
  text-decoration:none;
  display:inline-block;
}

/* SECTION */
.section {
  padding:70px 20px;
  text-align:center;
}

.section h2 {
  font-family:'Bebas Neue';
  font-size:60px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  max-width:1100px;
  margin:30px auto;
}

/* CARD */
.card {
  background:rgba(245,245,245,0.06);
  color:white;
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.10);
  position:relative;
  overflow:hidden;
  transition:0.25s ease;
  backdrop-filter:blur(10px);
}

.card:hover {
  transform:translateY(-6px);
  border-color:rgba(198,164,108,0.4);
}

/* WHY BORDER */
.section:nth-of-type(2) .card {
  border:1px solid var(--gold);
}

/* PREMIUM GLOW */
.special .card::before {
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(
    500px circle at var(--x, 50%) var(--y, 50%),
    rgba(255,42,42,0.35),
    transparent 45%
  );
  opacity:0;
  transition:opacity 0.15s ease;
  pointer-events:none;
}

.special .card:hover::before,
.special .card.active::before {
  opacity:1;
}

/* NUMBER */
.number {
  position:absolute;
  top:-30px;
  right:10px;
  font-size:150px;
  color:rgba(255,42,42,0.20);
  font-family:'Bebas Neue';
}

/* SOLUTION */
.solution {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  max-width:1000px;
  margin:auto;
  font-size:20px;
}

/* FLOW */
.flow {
  font-size:26px;
  color:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CTA BLOCK */
.cta-block {
  background:var(--gold);
  color:black;
  padding:70px 20px;
  text-align:center;
}

/* FORM FIX */
#mlb2-41605663 input,
.select-btn,
#mlb2-41605663 button {
  height:60px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  opacity:0.7;
}

@media(max-width:768px){
  .hero h1 {font-size:60px;}
  .section h2 {font-size:40px;}
  .grid {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="grid-bg"></div>
<div class="cursor"></div>

<div class="header">
  <div class="logo">LIONSIGN</div>
  <div class="contact">
    <a href="https://www.facebook.com/kristina.radosavljevic" target="_blank">CONTACT</a>
  </div>
</div>

<section class="hero">
  <h1>WEB SYSTEM FOR CLIENT GENERATION</h1>
  <p>
    A modular system where every offer has its own landing page,<br>
    and every click leads to a client.
  </p>
  <a href="https://www.lionsignstudio.com" class="cta" target="_blank">VIEW DEMO</a>
</section>

<!-- ostatak ostaje 100% ISTI -->

<script>
const cursor = document.querySelector('.cursor');

document.addEventListener('mousemove', e=>{
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

/* cursor scale + glow */
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('mouseenter', ()=>{
    cursor.classList.add('active');
    card.classList.add('active');
  });
  card.addEventListener('mouseleave', ()=>{
    cursor.classList.remove('active');
    card.classList.remove('active');
  });
});

/* dropdown */
const btn = document.getElementById('selectBtn');
const options = document.getElementById('options');

btn.addEventListener('click', ()=>{
  options.style.display = options.style.display === 'block' ? 'none' : 'block';
});

document.querySelectorAll('.option').forEach(opt=>{
  opt.addEventListener('click', ()=>{
    btn.textContent = opt.textContent;
    options.style.display = 'none';
  });
});

/* glow tracking */
document.querySelectorAll('.special .card').forEach(card=>{
  card.addEventListener('mousemove', (e)=>{
    const rect = card.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    card.style.setProperty('--x', x + '%');
    card.style.setProperty('--y', y + '%');
  });
});
</script>

</body>
</html>
